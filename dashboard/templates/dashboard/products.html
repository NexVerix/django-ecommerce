<h2 class="text-xl font-bold mb-4">Products</h2>

<a href="/admin-dashboard/products/add/"
   class="bg-blue-500 text-white px-4 py-2 mb-4 inline-block">
   Add Product
</a>

{% for product in products %}
<div class="bg-white p-3 mb-2 shadow flex justify-between">
    <span>{{ product.title }} - ${{ product.price }}</span>

    <a href="/admin-dashboard/products/delete/{{ product.id }}/"
       class="bg-red-500 text-white px-2 py-1">
       Delete
    </a>
</div>
{% endfor %}
