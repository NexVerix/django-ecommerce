{% extends 'store/base.html' %}

{% block content %}

<h2 class="text-xl font-bold mb-4">Order History</h2>

{% for order in orders %}
<div class="bg-white p-4 mb-3 shadow">
    <p><strong>Total:</strong> ${{ order.total }}</p>
    <p><strong>Date:</strong> {{ order.created_at }}</p>
</div>
{% empty %}
<p>No orders yet.</p>
{% endfor %}

{% endblock %}
